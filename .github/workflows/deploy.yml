name: Build & Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEPLOY_SERVER=${{ secrets.SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_SUFFIX=prod" >> $GITHUB_ENV
            echo "ENV_TAG=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_SERVER=${{ secrets.SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_SUFFIX=dev" >> $GITHUB_ENV
            echo "ENV_TAG=development" >> $GITHUB_ENV
          fi

      - name: Create .env file
        run: echo "${{ secrets.APP_ENV_FILE }}" > next/.env.production

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t portfolio-app:${{ github.sha }} \
            -t portfolio-app:latest \
            .

      - name: Save & compress Docker image
        run: docker save portfolio-app:latest | gzip > app-image.tar.gz

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app-image.tar.gz,docker/docker-compose.yml,docker/docker-compose.${{ env.ENV_SUFFIX }}.yml"
          target: ${{ env.DEPLOY_DIR }}

      - name: Load image & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker load -i app-image.tar.gz
            docker compose -f docker/docker-compose.yml \
              -f docker/docker-compose.${{ env.ENV_SUFFIX }}.yml \
              up -d app
            rm -f app-image.tar.gz
            echo "Deployed: ${{ github.sha }} (${{ env.ENV_TAG }})"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for app... ($i/5)"
              sleep 5
            done
            echo "Health check failed"
            exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *DEPLOYED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *DEPLOY FAILED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
